<!DOCTYPE html>
<html lang="es">
<head>
  <title>MIDECAR | Clientes</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="page-clients">
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="Index.html" aria-label="MIDECAR inicio">
        <img src="logosmidecar/LogoMidecar_R.png" alt="Logo MIDECAR">
      </a>
      <nav class="main-nav" aria-label="Navegacion principal">
        <a href="Index.html">INICIO</a>
        <a href="Nosotros.html">NOSOTROS</a>
        <a href="Servicios.html">SERVICIOS</a>
        <a class="active" href="Clientes.html">CLIENTES</a>
        <a class="btn-blue nav-quote" href="Cotizar.html">COTIZAR</a>
      </nav>
    </div>
  </header>

  <main class="hero clients-hero">
    <section class="clients-panel-wrap">
      <form class="feedback-card" id="feedbackForm">
        <h1>¡Gracias por confiar en MIDECAR!</h1>
        <div class="form-grid">
          <input type="text" name="nombre" placeholder="Nombre completo">
          <input type="text" name="empresa" placeholder="Empresa">
          <input type="email" name="mail" placeholder="Mail">
          <textarea name="comentario" placeholder="Comentario"></textarea>
          <button class="btn-blue form-submit" type="submit">Enviar tu comentario</button>
        </div>
      </form>
    </section>
  </main>

  <div class="quote-thanks" id="feedbackThanks" role="status" aria-live="polite" hidden>
    Gracias por enviar tu comentario
  </div>

  <script>
    const feedbackForm = document.getElementById("feedbackForm");
    const feedbackThanks = document.getElementById("feedbackThanks");

    feedbackForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = new FormData(feedbackForm);
      const body = [
        `Nombre completo: ${data.get("nombre") || ""}`,
        `Empresa: ${data.get("empresa") || ""}`,
        `Mail: ${data.get("mail") || ""}`,
        "",
        `Comentario: ${data.get("comentario") || ""}`
      ].join("\n");

      feedbackThanks.hidden = false;
      window.location.href = `mailto:info@midecar.ec?subject=${encodeURIComponent("Comentario de cliente MIDECAR")}&body=${encodeURIComponent(body)}`;

      setTimeout(() => {
        feedbackThanks.hidden = true;
      }, 3500);
    });
  </script>
</body>
</html>
