<!DOCTYPE html>
<html lang="es">
<head>
  <title>MIDECAR | Cotizar</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="page-quote">
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html" aria-label="MIDECAR inicio">
        <img src="logosmidecar/LogoMidecar_R.png" alt="Logo MIDECAR">
      </a>
      <nav class="main-nav" aria-label="Navegacion principal">
        <a href="index.html">INICIO</a>
        <a href="Nosotros.html">NOSOTROS</a>
        <a href="Servicios.html">SERVICIOS</a>
        <a href="Clientes.html">CLIENTES</a>
        <a class="btn-blue nav-quote" href="Cotizar.html">COTIZAR</a>
      </nav>
    </div>
  </header>

  <main class="hero quote-hero">
    <section class="quote-layout">
      <div class="quote-message">
        <h1>Somos una almacenera con certificaciones</h1>
        <img class="cert-logo" src="Logos/logo-BASC.png" alt="Certificación BASC">
      </div>

      <form class="quote-card" id="quoteForm">
        <h1>Almacena con nosotros</h1>
        <div class="form-grid">
          <input type="text" name="nombre" placeholder="Nombre completo">
          <input type="text" name="empresa" placeholder="Empresa">
          <div class="form-grid two">
            <input type="tel" name="telefono" placeholder="Teléfono">
            <input type="email" name="mail" placeholder="Mail">
          </div>
          <textarea name="servicio" placeholder="Tipo de servicio que necesita"></textarea>
          <textarea name="producto" placeholder="Producto a almacenar"></textarea>
          <button class="btn-blue form-submit" type="submit">Cotizar</button>
          <a class="btn-blue form-submit whatsapp" href="https://wa.me/593994209104" target="_blank" rel="noopener">Contactar a WhatsApp</a>
        </div>
      </form>
    </section>
  </main>

  <div class="quote-thanks" id="quoteThanks" role="status" aria-live="polite" hidden>
    Gracias por cotizar con nosotros
  </div>

  <script>
    const quoteForm = document.getElementById("quoteForm");
    const quoteThanks = document.getElementById("quoteThanks");

    quoteForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = new FormData(quoteForm);
      const body = [
        `Nombre completo: ${data.get("nombre") || ""}`,
        `Empresa: ${data.get("empresa") || ""}`,
        `Teléfono: ${data.get("telefono") || ""}`,
        `Mail: ${data.get("mail") || ""}`,
        "",
        `Tipo de servicio que necesita: ${data.get("servicio") || ""}`,
        "",
        `Producto a almacenar: ${data.get("producto") || ""}`
      ].join("\n");

      quoteThanks.hidden = false;
      window.location.href = `mailto:info@midecar.ec?subject=${encodeURIComponent("Solicitud de cotización MIDECAR")}&body=${encodeURIComponent(body)}`;

      setTimeout(() => {
        quoteThanks.hidden = true;
      }, 3500);
    });
  </script>
</body>
</html>
